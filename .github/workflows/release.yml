name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: obsidian-plugin-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout immutable tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "10.34.4"
          run_install: false

      - name: Validate release identity
        shell: bash
        run: |
          set -Eeuo pipefail
          tag="${GITHUB_REF_NAME}"
          [[ "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "$(git describe --tags --exact-match)" = "$tag"
          test "$(node -p "require('./manifest.json').version")" = "$tag"
          test "$(node -p "require('./package.json').version")" = "$tag"
          node -e "const v=require('./versions.json'); if (!v[process.argv[1]]) process.exit(1)" "$tag"
          test "$(node -p "require('./manifest.json').id")" = "trans-hub-plugin-localizer"

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify source and build production assets
        run: |
          set -Eeuo pipefail
          pnpm verify:public-copy
          pnpm lint
          pnpm type-check
          pnpm test
          pnpm package
          test -f main.js
          test -f manifest.json
          test -f styles.css
          grep -F 'https://api.trans-hub.net' main.js >/dev/null
          ! grep -E 'https?://(127\.0\.0\.1|localhost)' main.js >/dev/null

      - name: Create release inventory
        shell: bash
        run: |
          set -Eeuo pipefail
          shasum -a 256 main.js manifest.json styles.css "release/trans-hub-plugin-localizer-${GITHUB_REF_NAME}.zip" \
            > SHA256SUMS

      - name: Attest release assets
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css
            release/trans-hub-plugin-localizer-${{ github.ref_name }}.zip

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -Eeuo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            main.js \
            manifest.json \
            styles.css \
            SHA256SUMS \
            "release/trans-hub-plugin-localizer-${GITHUB_REF_NAME}.zip"
